<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link
      rel="icon"
      type="image/svg+xml"
      href="/favicon.svg"
    />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0"
    />
    <link
      rel="stylesheet"
      href="./src/styles/main.css"
    />
    <link
      rel="stylesheet"
      href="./src/styles/header.css"
    />
    <link
      rel="stylesheet"
      href="./src/styles/side-bar.css"
    />
    <title>vention-html-task</title>
  </head>
  <body>
    <!-- Header Banner -->
    <header class="hero-header">
      <!-- Hero Text -->
      <div class="hero-text-container">
        <h1 class="hero-title">Let Make Something Great</h1>
        <p class="hero-subtitle">
          Lorem ipsum dolor sit amet consectetur adipisicing elit. Velit,
          incidunt?
        </p>
      </div>
    </header>

    <!-- Toggle Sidebar -->
    <button
      id="menu-toggle"
      aria-label="Open Menu"
    >
      <svg
        viewBox="0 0 488 488"
        id="toggle-icon"
      >
        <use xlink:href="./src/assets/svg-spreedsheet.svg#burger-menu"></use>
      </svg>
    </button>

    <!-- Sidebar -->
    <nav
      class="side-menu"
      id="side-menu"
    >
      <div class="side-menu-header"></div>
      <ul class="side-menu-links">
        <li>
          <a
            href="#"
            class="menu-link active"
            data-target="clients"
            >Clients</a
          >
        </li>
        <li>
          <a
            href="#"
            class="menu-link"
            data-target="products"
            >Products</a
          >
        </li>
        <li>
          <a
            href="#"
            class="menu-link"
            data-target="feedback"
            >Feedback</a
          >
        </li>
      </ul>
    </nav>

    <script
      type="module"
      src="/src/main.js"
    ></script>
  </body>
</html>
